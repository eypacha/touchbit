<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
  
    <meta property="og:title" content="Touchbit" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://dev.eypacha.com/touchbit/touchbit.png" />
    <meta property="og:image:width" content="600" />
    <meta property="og:image:height" content="600" />
    <meta property="og:description" content="Bytebeat for mobile" />
    <meta property="og:url" content="https://dev.eypacha.com/touchbit" />
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@eypacha">
    <meta name="twitter:creator" content="@eypacha">
    <meta name="twitter:domain" content="dev.eypacha.com">
    <meta name="twitter:title" content="Touchbit">
    <meta name="twitter:url" content="https://dev.eypacha.com/touchbit">
    <meta name="twitter:description" content="Bytebeat for mobile">
    <meta name="twitter:image:src" content="https://dev.eypacha.com/touchbit/touchbit.png">
  
    <link href="icon.png" rel="shortcut icon" type="image/png">
    <link rel="stylesheet" href="styles/main.css">
  
    <title>Touchbit</title>
    <script src="js/lzma.min.js"></script>
    <script src="js/wavmaker.min.js"></script>

  </head>
  <body>

      <div id="split">
        <div id="main">
          <div id="foreground">
            <div id="controls"></div>
            <div class="stack-container">
              <div id="stack"></div>
            </div>
            <pre id="debug" style="display: none;"></pre>
            <div id="keyboard">
              <div class="row">
                <div class="column">
                  <div class="row">
                    <button class="button number layer-1" data-insert="7">7</button>
                    <button class="button modifier layer-2" data-modifier="+1">+1</button>
                    <button class="button number layer-1" data-insert="8">8</button>
                    <button class="button modifier layer-2" data-modifier="+5">+5</button>
                    <button class="button number layer-1" data-insert="9">9</button>
                    <button class="button modifier layer-2" data-modifier="+10">+10</button>
                  </div>
                  <div class="row">
                    <button class="button number layer-1" data-insert="4">4</button>
                    <button class="button modifier layer-2" data-modifier="-1">-1</button>
                    <button class="button number layer-1" data-insert="5">5</button>
                    <button class="button modifier layer-2" data-modifier="-5">-5</button>
                    <button class="button number layer-1" data-insert="6">6</button>
                    <button class="button modifier layer-2" data-modifier="-10">-10</button>
                  </div>
                  <div class="row">
                    <button class="button number layer-1" data-insert="1">1</button>
                    <button class="button modifier layer-2" data-modifier="+0.1">+.1</button>
                    <button class="button number layer-1" data-insert="2">2</button>
                    <button class="button modifier layer-2" data-modifier="+0.01">+.01</button>
                    <button class="button number layer-1" data-insert="3">3</button>
                    <button class="button modifier layer-2" data-modifier="+0.001">+.001</button>
                  </div>
                  <div class="row">
                    <button class="button number layer-1" data-insert=".">.</button>
                    <button class="button modifier layer-2" data-modifier="-0.1">-.1</button>
                    <button class="button number layer-1" data-insert="0">0</button>
                    <button class="button modifier layer-2" data-modifier="-0.01">-.01</button>
                    <button class="button modifier layer-1" data-modifier="clear">⌫</button>
                    <button class="button modifier layer-2" data-modifier="-0.001">-.001</button>
                    
                  </div>
                </div>
                <div class="column">
                  <div class="row">
                    <button class="button symbol layer-1" data-insert="*">*</button>
                    <button class="button symbol layer-2" data-insert="?">?</button>
                    <button class="button symbol layer-1" data-insert="/">/</button>
                    <button class="button symbol layer-2" data-insert=":">:</button>
                    <button class="button symbol layer-1" data-insert="&">&</button>
                    <button class="button symbol layer-2" data-insert="&&">&&</button>
                  </div>
                  <div class="row">
                    <button class="button symbol layer-1" data-insert="+">+</button>
                    <button class="button symbol layer-2" data-insert="<">&lt;</button>
                    <button class="button symbol layer-1" data-insert="-">-</button>
                    <button class="button symbol layer-2" data-insert=">">&gt;</button>
                    <button class="button symbol layer-1"  data-insert="|">&vert;</button>
                    <button class="button symbol layer-2"  data-insert="=">=</button>
                  </div>
                  <div class="row">
                    <button class="button symbol layer-2" data-insert="||">‖</button>
                    <button class="button symbol layer-1" data-insert="%">%</button>
                    <button class="button symbol layer-2 small" data-insert="drop">drop</button>
                    <button class="button symbol layer-1" data-insert="~">~</button>
                    <button class="button symbol layer-2 small" data-insert="dup">dup</button>
                    <button class="button symbol layer-1" data-insert="^">^</button>
                  </div>
                  <div class="row">
                    <button class="button symbol t layer-1" data-insert="t">t</button>
                    <button class="button symbol layer-2 small" data-insert="swap">swap</button>
                    <button class="button symbol layer-1" data-insert="<<">&laquo;</button>
                    <button class="button symbol layer-2 small" data-insert="pick">pick</button>
                    <button class="button symbol layer-1" data-insert=">>">&raquo;</button>
                    <button class="button symbol layer-2 small" data-insert="put">put</button>
                  </div>
                </div>
             </div>
    
             <div class="row">
  
              <button class="button magenta command" id="fnMode">FN</button>
              <button class="button magenta command" id="holdMode">HOLD</button>
              <button class="button magenta command" id="insertSlot">INS</button>
              <button class="button magenta command" id="deleteSlot">DEL</button>
              <button class="button magenta command" id="selectPrev">←</button>
              <button class="button magenta command" id="selectNext">→</button>
            </div>
            </div>
          </div>
        </div>
      </div>
    
      <div id="savedialog">
        <div id="savecontainer">
          <div id="saveform">
            <div>
              <img id="screenshot" />
            </div>
            <div class="settings">
              <div> seconds: <input id="seconds" type="number" inputmode="numeric"  value="30" min="0" max="10000"></div>
            </div>
            <div><button id="save">save</button><button id="cancel">cancel</button></div>
          </div>
        </div>
      </div>
      <div id="loadingContainer">
        <div>loading...</div>
      </div>
      
     <script type="module" src="editor/index.js"></script>
    </body>
    
  
</html>
